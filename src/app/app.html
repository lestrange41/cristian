<div class="global-waveform-bg">
  <app-waveform />
</div>

<app-intro />

<app-navbar />

<main class="page-wrapper">
  <app-home />
  <div class="divider"></div>
  <app-timeline />
  <div class="divider"></div>
  <app-mixer />
  <div class="divider"></div>
  <app-mensajes />
  <div class="divider"></div>
  <app-encore />
</main>

<!-- Panic Button -->
<button class="panic-btn" (click)="onPanic()" data-tooltip="QUAN ESTIGUIS ESTRESSAT I NECESSITIS UNA MICA DE CONFETI, CLICKA EL BOTÓ DEL PÀNIC"></button>

<!-- Global Toast Container -->
<div class="toast-container">
  <div class="toast" *ngFor="let t of toastService.toasts()" (click)="toastService.dismiss(t.id)">
    {{ t.message }}
  </div>
</div>

<!-- Global Modal -->
<app-modal />

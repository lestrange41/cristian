<div class="carousel-container">
  <!-- Slides -->
  <div class="carousel-slides"
       [style.transform]="'translateX(-' + (currentIndex() * 100) + '%)'">
    <div class="carousel-slide" *ngFor="let photo of photos">
      @if (photo.url) {
        <img [src]="photo.url" [alt]="photo.caption || 'Foto'" class="slide-image" />
      } @else {
        <div class="slide-placeholder">{{ photo.placeholder }}</div>
      }
      @if (photo.caption) {
        <p class="slide-caption">{{ photo.caption }}</p>
      }
    </div>
  </div>

  <!-- Controls -->
  @if (photos.length > 1) {
    <div class="carousel-controls">
      <button class="carousel-btn" (click)="prev()" aria-label="Foto anterior">‹</button>

      <div class="carousel-dots">
        <div
          *ngFor="let photo of photos; let i = index"
          class="carousel-dot"
          [class.active]="i === currentIndex()"
          (click)="goTo(i)"
          [attr.aria-label]="'Anar a foto ' + (i + 1)">
        </div>
      </div>

      <button class="carousel-play"
              (click)="toggleAutoplay()"
              [attr.aria-label]="isPlaying() ? 'Pausar' : 'Reproduir'">
        {{ isPlaying() ? '⏸' : '▶' }}
      </button>

      <button class="carousel-btn" (click)="next()" aria-label="Foto següent">›</button>
    </div>
  }
</div>
